<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="800" height="180">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#999999" opacity="0.5"/>
    </marker>
  </defs>
  <rect width="800" height="180" rx="12" fill="#121212"/>

  <!-- Owner -->
  <rect x="30" y="40" width="150" height="70" rx="8" fill="#4caf50" fill-opacity="0.15" stroke="#4caf50" stroke-width="1.5"/>
  <text x="105" y="70" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#4caf50">Owner</text>
  <text x="105" y="92" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a5d6a7">Full control</text>

  <!-- Arrow -->
  <line x1="190" y1="75" x2="226" y2="75" stroke="#999999" stroke-width="1" opacity="0.5" marker-end="url(#arr)"/>

  <!-- Admin -->
  <rect x="236" y="40" width="150" height="70" rx="8" fill="#1c1c1c" stroke="#4caf50" stroke-width="1" stroke-opacity="0.5"/>
  <text x="311" y="70" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e0e0e0">Admin</text>
  <text x="311" y="92" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">Manage users</text>

  <!-- Arrow -->
  <line x1="396" y1="75" x2="432" y2="75" stroke="#999999" stroke-width="1" opacity="0.5" marker-end="url(#arr)"/>

  <!-- Member -->
  <rect x="442" y="40" width="150" height="70" rx="8" fill="#1c1c1c" stroke="#333333" stroke-width="1"/>
  <text x="517" y="70" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e0e0e0">Member</text>
  <text x="517" y="92" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">Create and edit</text>

  <!-- Arrow -->
  <line x1="602" y1="75" x2="638" y2="75" stroke="#999999" stroke-width="1" opacity="0.5" marker-end="url(#arr)"/>

  <!-- Guest -->
  <rect x="648" y="40" width="120" height="70" rx="8" fill="#1c1c1c" stroke="#333333" stroke-width="1" stroke-dasharray="4"/>
  <text x="708" y="70" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#999999">Guest</text>
  <text x="708" y="92" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">View only</text>

  <!-- Decreasing privilege indicator -->
  <line x1="50" y1="135" x2="750" y2="135" stroke="#333333" stroke-width="1"/>
  <text x="50" y="155" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#4caf50">More access</text>
  <text x="750" y="155" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#999999">Less access</text>
  <!-- Gradient dots -->
  <circle cx="200" cy="135" r="3" fill="#4caf50" opacity="0.8"/>
  <circle cx="310" cy="135" r="3" fill="#4caf50" opacity="0.5"/>
  <circle cx="420" cy="135" r="3" fill="#4caf50" opacity="0.3"/>
  <circle cx="530" cy="135" r="3" fill="#999999" opacity="0.4"/>
  <circle cx="640" cy="135" r="3" fill="#999999" opacity="0.2"/>
</svg>
