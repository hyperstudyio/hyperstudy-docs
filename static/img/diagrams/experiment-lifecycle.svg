<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4caf50" opacity="0.6"/>
    </marker>
  </defs>
  <rect width="800" height="220" rx="12" fill="#121212"/>

  <!-- Step 1: Design -->
  <rect x="30" y="50" width="120" height="120" rx="8" fill="#1c1c1c" stroke="#4caf50" stroke-width="1.5"/>
  <text x="90" y="100" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e0e0e0">Design</text>
  <text x="90" y="122" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">Build experiment</text>
  <text x="90" y="137" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">with visual editor</text>

  <!-- Arrow 1 -->
  <line x1="160" y1="110" x2="186" y2="110" stroke="#4caf50" stroke-width="1.5" opacity="0.6" marker-end="url(#arrow)"/>

  <!-- Step 2: Deploy -->
  <rect x="195" y="50" width="120" height="120" rx="8" fill="#1c1c1c" stroke="#333333" stroke-width="1"/>
  <text x="255" y="100" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e0e0e0">Deploy</text>
  <text x="255" y="122" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">Recruit via lab,</text>
  <text x="255" y="137" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">link, or Prolific</text>

  <!-- Arrow 2 -->
  <line x1="325" y1="110" x2="351" y2="110" stroke="#4caf50" stroke-width="1.5" opacity="0.6" marker-end="url(#arrow)"/>

  <!-- Step 3: Run -->
  <rect x="360" y="50" width="120" height="120" rx="8" fill="#1c1c1c" stroke="#2196f3" stroke-width="1.5"/>
  <text x="420" y="100" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e0e0e0">Run</text>
  <text x="420" y="122" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">Synchronized</text>
  <text x="420" y="137" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">real-time sessions</text>

  <!-- Arrow 3 -->
  <line x1="490" y1="110" x2="516" y2="110" stroke="#4caf50" stroke-width="1.5" opacity="0.6" marker-end="url(#arrow)"/>

  <!-- Step 4: Collect -->
  <rect x="525" y="50" width="120" height="120" rx="8" fill="#1c1c1c" stroke="#333333" stroke-width="1"/>
  <text x="585" y="100" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e0e0e0">Collect</text>
  <text x="585" y="122" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">10+ data types</text>
  <text x="585" y="137" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">auto-recorded</text>

  <!-- Arrow 4 -->
  <line x1="655" y1="110" x2="681" y2="110" stroke="#4caf50" stroke-width="1.5" opacity="0.6" marker-end="url(#arrow)"/>

  <!-- Step 5: Analyze -->
  <rect x="690" y="50" width="80" height="120" rx="8" fill="#1c1c1c" stroke="#333333" stroke-width="1"/>
  <text x="730" y="100" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e0e0e0">Export</text>
  <text x="730" y="122" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">CSV, JSON,</text>
  <text x="730" y="137" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">ZIP, or API</text>

  <!-- Step numbers -->
  <circle cx="90" cy="55" r="10" fill="#4caf50"/>
  <text x="90" y="59" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">1</text>
  <circle cx="255" cy="55" r="10" fill="#333333"/>
  <text x="255" y="59" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#e0e0e0">2</text>
  <circle cx="420" cy="55" r="10" fill="#2196f3"/>
  <text x="420" y="59" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">3</text>
  <circle cx="585" cy="55" r="10" fill="#333333"/>
  <text x="585" y="59" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#e0e0e0">4</text>
  <circle cx="730" cy="55" r="10" fill="#333333"/>
  <text x="730" y="59" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#e0e0e0">5</text>
</svg>
