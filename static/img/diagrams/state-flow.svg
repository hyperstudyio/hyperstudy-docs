<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4caf50" opacity="0.6"/>
    </marker>
  </defs>
  <rect width="800" height="280" rx="12" fill="#121212"/>

  <!-- State 1 -->
  <rect x="40" y="40" width="190" height="100" rx="8" fill="#1c1c1c" stroke="#4caf50" stroke-width="1.5"/>
  <circle cx="60" cy="60" r="10" fill="#4caf50" opacity="0.2" stroke="#4caf50" stroke-width="1"/>
  <text x="60" y="64" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#4caf50">1</text>
  <text x="135" y="64" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#e0e0e0">Welcome</text>
  <text x="135" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">Text Display</text>
  <text x="135" y="106" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">component</text>

  <!-- Transition arrow 1 -->
  <line x1="240" y1="90" x2="296" y2="90" stroke="#4caf50" stroke-width="1.2" opacity="0.6" marker-end="url(#arr)"/>
  <rect x="243" y="70" width="50" height="18" rx="4" fill="#252525"/>
  <text x="268" y="83" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#a5d6a7">Button</text>

  <!-- State 2 -->
  <rect x="306" y="40" width="190" height="100" rx="8" fill="#1c1c1c" stroke="#2196f3" stroke-width="1.5"/>
  <circle cx="326" cy="60" r="10" fill="#2196f3" opacity="0.2" stroke="#2196f3" stroke-width="1"/>
  <text x="326" y="64" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#2196f3">2</text>
  <text x="401" y="64" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#e0e0e0">Watch Video</text>
  <text x="401" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">Video Player +</text>
  <text x="401" y="106" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">Continuous Rating</text>

  <!-- Transition arrow 2 -->
  <line x1="506" y1="90" x2="562" y2="90" stroke="#4caf50" stroke-width="1.2" opacity="0.6" marker-end="url(#arr)"/>
  <rect x="505" y="70" width="58" height="18" rx="4" fill="#252525"/>
  <text x="534" y="83" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#a5d6a7">Timer 30s</text>

  <!-- State 3 -->
  <rect x="572" y="40" width="190" height="100" rx="8" fill="#1c1c1c" stroke="#333333" stroke-width="1"/>
  <circle cx="592" cy="60" r="10" fill="#333333" stroke="#999999" stroke-width="1"/>
  <text x="592" y="64" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#e0e0e0">3</text>
  <text x="667" y="64" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#e0e0e0">Rate</text>
  <text x="667" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">Likert Scale</text>
  <text x="667" y="106" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999999">component</text>

  <!-- Global components bar -->
  <text x="400" y="180" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#b0b0b0">Global Components</text>
  <rect x="40" y="195" width="722" height="50" rx="6" fill="#1c1c1c" stroke="#333333" stroke-width="1"/>

  <!-- Video Chat indicator -->
  <rect x="60" y="205" width="170" height="30" rx="4" fill="#2196f3" fill-opacity="0.1" stroke="#2196f3" stroke-width="1" stroke-opacity="0.4"/>
  <text x="145" y="224" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#90caf9">Video Chat</text>

  <!-- Dots showing which states have it -->
  <circle cx="330" cy="220" r="4" fill="#4caf50"/>
  <circle cx="345" cy="220" r="4" fill="#4caf50"/>
  <circle cx="360" cy="220" r="4" fill="#333333"/>
  <text x="380" y="224" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#999999">States 1, 2</text>

  <!-- Sparse Rating indicator -->
  <rect x="460" y="205" width="170" height="30" rx="4" fill="#4caf50" fill-opacity="0.08" stroke="#4caf50" stroke-width="1" stroke-opacity="0.3"/>
  <text x="545" y="224" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#a5d6a7">Sparse Rating</text>

  <circle cx="680" cy="220" r="4" fill="#333333"/>
  <circle cx="695" cy="220" r="4" fill="#4caf50"/>
  <circle cx="710" cy="220" r="4" fill="#333333"/>
  <text x="730" y="224" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#999999">State 2</text>
</svg>
