<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 310" width="800" height="310">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#999999"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4caf50" opacity="0.5"/>
    </marker>
  </defs>
  <rect width="800" height="310" rx="12" fill="#121212"/>

  <!-- Data sources - left column -->
  <rect x="30" y="30" width="130" height="44" rx="6" fill="#1c1c1c" stroke="#4caf50" stroke-width="1" stroke-opacity="0.4"/>
  <text x="95" y="57" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#a5d6a7">Events</text>

  <rect x="30" y="84" width="130" height="44" rx="6" fill="#1c1c1c" stroke="#4caf50" stroke-width="1" stroke-opacity="0.4"/>
  <text x="95" y="111" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#a5d6a7">Ratings</text>

  <rect x="30" y="138" width="130" height="44" rx="6" fill="#1c1c1c" stroke="#4caf50" stroke-width="1" stroke-opacity="0.4"/>
  <text x="95" y="165" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#a5d6a7">Questionnaires</text>

  <rect x="30" y="192" width="130" height="44" rx="6" fill="#1c1c1c" stroke="#2196f3" stroke-width="1" stroke-opacity="0.4"/>
  <text x="95" y="219" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#90caf9">Chat</text>

  <rect x="30" y="246" width="130" height="44" rx="6" fill="#1c1c1c" stroke="#2196f3" stroke-width="1" stroke-opacity="0.4"/>
  <text x="95" y="267" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#90caf9">Recordings</text>
  <text x="95" y="281" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#999999">Video + Sync</text>

  <!-- Arrows to center -->
  <line x1="170" y1="52" x2="298" y2="145" stroke="#999999" stroke-width="1" opacity="0.4" marker-end="url(#arr)"/>
  <line x1="170" y1="106" x2="298" y2="150" stroke="#999999" stroke-width="1" opacity="0.4" marker-end="url(#arr)"/>
  <line x1="170" y1="160" x2="298" y2="155" stroke="#999999" stroke-width="1" opacity="0.4" marker-end="url(#arr)"/>
  <line x1="170" y1="214" x2="298" y2="160" stroke="#999999" stroke-width="1" opacity="0.4" marker-end="url(#arr)"/>
  <line x1="170" y1="268" x2="298" y2="165" stroke="#999999" stroke-width="1" opacity="0.4" marker-end="url(#arr)"/>

  <!-- Center: API -->
  <rect x="308" y="100" width="180" height="110" rx="8" fill="#4caf50" fill-opacity="0.1" stroke="#4caf50" stroke-width="1.5"/>
  <text x="398" y="140" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#4caf50">Data API</text>
  <text x="398" y="162" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#b0b0b0">Collection, storage,</text>
  <text x="398" y="178" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#b0b0b0">and retrieval</text>

  <!-- Arrows to right -->
  <line x1="498" y1="135" x2="566" y2="75" stroke="#4caf50" stroke-width="1" opacity="0.5" marker-end="url(#arr-g)"/>
  <line x1="498" y1="155" x2="566" y2="155" stroke="#4caf50" stroke-width="1" opacity="0.5" marker-end="url(#arr-g)"/>
  <line x1="498" y1="175" x2="566" y2="235" stroke="#4caf50" stroke-width="1" opacity="0.5" marker-end="url(#arr-g)"/>

  <!-- Export formats -->
  <rect x="576" y="40" width="100" height="55" rx="6" fill="#1c1c1c" stroke="#333333" stroke-width="1"/>
  <text x="626" y="65" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#e0e0e0">CSV</text>
  <text x="626" y="82" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#999999">Tabular export</text>

  <rect x="576" y="120" width="100" height="55" rx="6" fill="#1c1c1c" stroke="#333333" stroke-width="1"/>
  <text x="626" y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#e0e0e0">JSON</text>
  <text x="626" y="162" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#999999">Structured data</text>

  <rect x="576" y="200" width="100" height="55" rx="6" fill="#1c1c1c" stroke="#333333" stroke-width="1"/>
  <text x="626" y="225" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#e0e0e0">ZIP</text>
  <text x="626" y="242" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#999999">Bulk download</text>

  <!-- REST API -->
  <rect x="700" y="100" width="80" height="110" rx="6" fill="#2196f3" fill-opacity="0.1" stroke="#2196f3" stroke-width="1.2"/>
  <text x="740" y="148" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#90caf9">REST</text>
  <text x="740" y="164" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#90caf9">API</text>
</svg>
